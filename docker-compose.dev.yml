# Development overlay: mount source trees and enable hot reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  backend:
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_HMR_HOST=${VITE_HMR_HOST:-}
    expose:
      - "5173"
    ports:
      - "5173:5173"

  admin-console:
    build:
      context: ./admin-console
      dockerfile: Dockerfile.dev
    volumes:
      - ./admin-console:/app
      - admin_console_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_HMR_HOST=${VITE_HMR_HOST:-}
    expose:
      - "5174"
    ports:
      - "5174:5174"

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro

volumes:
  frontend_node_modules:
  admin_console_node_modules:
