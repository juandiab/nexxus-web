services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexxustech-frontend
    restart: unless-stopped
    networks:
      - nexxus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexxustech-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/app/data
    networks:
      - nexxus-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nexxustech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - nexxus-net

networks:
  nexxus-net:
    driver: bridge
