services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexxustech-frontend
    restart: unless-stopped
    networks:
      - nexxus-net

  admin-console:
    build:
      context: ./admin-console
      dockerfile: Dockerfile
    container_name: nexxustech-admin-console
    restart: unless-stopped
    networks:
      - nexxus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexxustech-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/app/data
    networks:
      - nexxus-net

  mongodb:
    image: mongo:7
    container_name: nexxustech-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"  # Exposed for external DB tools — keep until further notice
    volumes:
      - licensing-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - nexxus-net

  licensing:
    build:
      context: ./licensing
      dockerfile: Dockerfile
    container_name: nexxustech-licensing
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - nexxus-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nexxustech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_CERTS_PATH:-./nginx/ssl}:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_started
      admin-console:
        condition: service_started
      backend:
        condition: service_started
      licensing:
        condition: service_healthy
    networks:
      - nexxus-net

networks:
  nexxus-net:
    driver: bridge

volumes:
  licensing-mongo-data:
