services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexxustech-frontend
    restart: unless-stopped
    networks:
      - nexxus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexxustech-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/app/data
    networks:
      - nexxus-net

  mongodb:
    image: mongo:7
    container_name: nexxustech-mongodb
    restart: unless-stopped
    volumes:
      - licensing-mongo-data:/data/db
    networks:
      - nexxus-net

  licensing:
    build:
      context: ./licensing
      dockerfile: Dockerfile
    container_name: nexxustech-licensing
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongodb
    networks:
      - nexxus-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nexxustech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_CERTS_PATH:-./nginx/ssl}:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - licensing
    networks:
      - nexxus-net

networks:
  nexxus-net:
    driver: bridge

volumes:
  licensing-mongo-data:
