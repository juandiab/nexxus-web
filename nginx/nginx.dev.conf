worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

    # OCSP stapling (same as NSAgent)
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ─── HTTP → HTTPS redirect (canonical host: nexxus-tech.com) ─────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name nexxus-tech.com;
        add_header Cache-Control "no-store" always;
        return 301 https://nexxus-tech.com$request_uri;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name www.nexxus-tech.com;
        add_header Cache-Control "no-store" always;
        return 301 https://nexxus-tech.com$request_uri;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name scstudio.nexxus-tech.com;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS www → apex redirect (except /licensing/ API — no 301 for POST clients) ─
    server {
        listen 443 ssl;
        http2 on;
        server_name www.nexxus-tech.com;

        ssl_certificate     /etc/nginx/ssl/cert.crt;
        ssl_certificate_key /etc/nginx/ssl/cert.key;

        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/cert.crt;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_conf_command Curves X25519MLKEM768:X25519:P-256:P-384;

        client_max_body_size 10M;

        location ^~ /licensing/ {
            proxy_pass         http://licensing:8001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location / {
            return 301 https://nexxus-tech.com$request_uri;
        }
    }

    # ─── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name nexxus-tech.com;

        # SSL — same paths as NSAgent (cert.crt = full chain PEM)
        ssl_certificate     /etc/nginx/ssl/cert.crt;
        ssl_certificate_key /etc/nginx/ssl/cert.key;

        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/cert.crt;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_conf_command Curves X25519MLKEM768:X25519:P-256:P-384;

        include /etc/nginx/security-headers.conf;

        client_max_body_size 10M;

        location = /nexxus-tech-favicon.png {
            include /etc/nginx/security-headers.conf;
            proxy_pass         http://frontend:5173/nexxus-tech-favicon.png;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable" always;
        }

        location = /favicon.ico {
            return 301 /nexxus-tech-favicon.png;
        }

        location = /nexxus-tech-icon.png {
            return 301 /nexxus-tech-favicon.png;
        }

        # ── Admin console (Vite dev / separate app) ───────────────────────────
        location = /adminconsole {
            return 301 https://$host/adminconsole/;
        }

        location ^~ /adminconsole/ {
            proxy_pass         http://admin-console:5174;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Frontend (Vite dev server) ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API Backend ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Extra rate limit on contact endpoint
        location /api/contact {
            limit_req zone=contact burst=5 nodelay;
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Licensing activation page (GET) / API alias (POST) ───────────────
        location = /licensing/activate {
            if ($request_method = POST) {
                rewrite ^ /_licensing_activate_post last;
            }
            proxy_pass         http://frontend:5173/licensing/activate;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location = /_licensing_activate_post {
            internal;
            proxy_pass         http://licensing:8001/activate;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Licensing API ─────────────────────────────────────────────────────
        location /licensing/ {
            proxy_pass         http://licensing:8001/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ─── SC Studio subdomain ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name scstudio.nexxus-tech.com;

        ssl_certificate     /etc/nginx/ssl/cert.crt;
        ssl_certificate_key /etc/nginx/ssl/cert.key;

        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/cert.crt;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_conf_command Curves X25519MLKEM768:X25519:P-256:P-384;

        include /etc/nginx/security-headers.conf;

        client_max_body_size 25M;

        location / {
            proxy_pass         http://scstudio-frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        location /api/ {
            proxy_pass         http://scstudio-backend-api:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /calibrations/ {
            proxy_pass         http://scstudio-backend-api:8000/calibrations/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /skill-feedback {
            proxy_pass         http://scstudio-backend-api:8000/skill-feedback;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location = /health {
            proxy_pass         http://scstudio-backend-api:8000/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
